name: Daily Job Digest

on:
  schedule:
    # Every weekday at 07:30 UTC (09:30 Barcelona time)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cache (seen jobs + source health)
        uses: actions/cache@v4
        with:
          path: |
            seen_jobs.json
            source_health.json
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
        run: python scraper.py

      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            seen_jobs.json
            source_health.json
          key: scraper-state-${{ github.run_id }}
